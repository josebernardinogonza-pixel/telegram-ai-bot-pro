name: 🤖 QuantBet AI (Telegram Bot)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'  # Se ejecuta cada 4 horas automáticamente

concurrency:
  group: bot-instance
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290  # Tiempo suficiente para que el bot chambee un buen rato
    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyTelegramBotAPI PyGithub google-genai

      - name: 🚀 Ejecutar QuantBet AI
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
        run: python bot.py
