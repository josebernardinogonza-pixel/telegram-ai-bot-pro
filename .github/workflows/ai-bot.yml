name: 🤖 AI Professional Bot (Telegram)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

concurrency:
  group: bot-instance
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python y dependencias
        run: |
          pip install pyTelegramBotAPI requests PyGithub google-generativeai

      - name: Ejecutar Bot IA
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
        run: python bot.py
