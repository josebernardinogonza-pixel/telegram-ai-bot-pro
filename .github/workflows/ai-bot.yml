name: 🤖 AI Professional Bot (Telegram)

on:
  workflow_dispatch: # Botón manual para encenderlo
  schedule:
    - cron: '0 */5 * * *' # Lo reinicia cada 5 horas para que GitHub no lo bloquee

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290 # Lo mantiene vivo casi 5 horas seguidas
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python y dependencias
        run: |
          pip install pyTelegramBotAPI requests PyGithub

      - name: Ejecutar Bot IA
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
        run: python bot.py
